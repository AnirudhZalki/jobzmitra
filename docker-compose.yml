services:
  db:
    image: postgres:15-alpine
    container_name: jobzmitra-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - jobzmitra-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: jobzmitra-backend
    restart: unless-stopped

    environment:
      DATABASE_URL: ${DATABASE_URL}

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "127.0.0.1:8000:8000"

    networks:
      - jobzmitra-network


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: jobzmitra-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "127.0.0.1:3000:3000"

    networks:
      - jobzmitra-network


volumes:
  postgres_data:


networks:
  jobzmitra-network:
    driver: bridge